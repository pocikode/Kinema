name: Build and Package

on:
  push:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Get version
        id: version
        run: |
          VERSION=$(sed -n 's/.*project(kinema VERSION \([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)).*/\1/p' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          brew install opencv glfw glew

      - name: Configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Package DMG
        run: |
          mkdir -p package
          cpack --config build/CPackConfig.cmake -B package

      - name: Rename DMG with version
        run: |
          SOURCE=$(ls package/*.dmg | head -n 1)
          TARGET="package/Kinema-${{ steps.version.outputs.version }}.dmg"
          if [ "$SOURCE" != "$TARGET" ]; then
            mv "$SOURCE" "$TARGET"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kinema-macOS-${{ steps.version.outputs.version }}
          path: package/Kinema-${{ steps.version.outputs.version }}.dmg

  build-windows:
    runs-on: windows-2025
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path CMakeLists.txt -Pattern 'project\(kinema VERSION ([\d\.]+)\)').Matches.Groups[1].Value
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies via vcpkg
        run: |
          C:\vcpkg\vcpkg.exe install --triplet x64-windows
        shell: cmd

      - name: Configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
        shell: cmd

      - name: Install NSIS
        run: choco install nsis -y
        shell: cmd

      - name: Build
        run: |
          cmake --build build --config Release --parallel %NUMBER_OF_PROCESSORS%
        shell: cmd

      - name: Package EXE
        run: |
          if not exist package mkdir package
          cpack --config build\CPackConfig.cmake -B package
        shell: cmd

      - name: Rename EXE with version
        shell: pwsh
        run: |
          $file = Get-ChildItem package\*.exe | Select-Object -First 1
          $target = "package\Kinema-${{ steps.version.outputs.version }}.exe"
          if ($file.Name -ne (Split-Path $target -Leaf)) {
            Rename-Item $file.FullName $target
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kinema-Windows-${{ steps.version.outputs.version }}
          path: package/Kinema-${{ steps.version.outputs.version }}.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine tag name
        id: tag
        run: |
          VERSION=$(sed -n 's/.*project(kinema VERSION \([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)).*/\1/p' CMakeLists.txt)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Kinema v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Download macOS artifact
        uses: actions/download-artifact@v7
        with:
          name: Kinema-macOS-${{ needs.build-macos.outputs.version }}
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: Kinema-Windows-${{ needs.build-windows.outputs.version }}
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
